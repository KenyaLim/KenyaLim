<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Kenya Syalwa Arifia — Informatics Student & Creative Explorer</title>
  <desc>A decorative header banner with a dark floral aesthetic featuring the name Kenya Syalwa Arifia</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a0d14"/>
      <stop offset="50%"  stop-color="#140a1a"/>
      <stop offset="100%" stop-color="#0d1419"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#E8A2C8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#E8A2C8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"  stop-color="#C9956A" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#C9956A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#F2C8DE"/>
      <stop offset="50%"  stop-color="#E8A2C8"/>
      <stop offset="100%" stop-color="#C9956A"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8A2C8" stop-opacity="0"/>
      <stop offset="30%" stop-color="#E8A2C8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#E8A2C8" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)" rx="14"/>

  <!-- Ambient glows -->
  <ellipse cx="180" cy="120" rx="220" ry="140" fill="url(#glow1)" filter="url(#blur1)"/>
  <ellipse cx="740" cy="180" rx="180" ry="100" fill="url(#glow2)" filter="url(#blur1)"/>
  <ellipse cx="450" cy="60"  rx="160" ry="80"  fill="#C87AB0" fill-opacity="0.06" filter="url(#blur2)"/>

  <!-- Decorative border -->
  <rect x="10" y="10" width="880" height="260" rx="10" fill="none" stroke="#E8A2C8" stroke-opacity="0.12" stroke-width="1"/>
  <rect x="16" y="16" width="868" height="248" rx="8"  fill="none" stroke="#E8A2C8" stroke-opacity="0.06" stroke-width="0.5"/>

  <!-- Corner ornaments - top left -->
  <g opacity="0.5">
    <line x1="24" y1="24" x2="60" y2="24" stroke="#E8A2C8" stroke-width="1"/>
    <line x1="24" y1="24" x2="24" y2="60" stroke="#E8A2C8" stroke-width="1"/>
    <circle cx="24" cy="24" r="2.5" fill="#E8A2C8"/>
  </g>
  <!-- top right -->
  <g opacity="0.5">
    <line x1="876" y1="24" x2="840" y2="24" stroke="#E8A2C8" stroke-width="1"/>
    <line x1="876" y1="24" x2="876" y2="60" stroke="#E8A2C8" stroke-width="1"/>
    <circle cx="876" cy="24" r="2.5" fill="#E8A2C8"/>
  </g>
  <!-- bottom left -->
  <g opacity="0.5">
    <line x1="24" y1="256" x2="60" y2="256" stroke="#E8A2C8" stroke-width="1"/>
    <line x1="24" y1="256" x2="24" y2="220" stroke="#E8A2C8" stroke-width="1"/>
    <circle cx="24" cy="256" r="2.5" fill="#E8A2C8"/>
  </g>
  <!-- bottom right -->
  <g opacity="0.5">
    <line x1="876" y1="256" x2="840" y2="256" stroke="#E8A2C8" stroke-width="1"/>
    <line x1="876" y1="256" x2="876" y2="220" stroke="#E8A2C8" stroke-width="1"/>
    <circle cx="876" cy="256" r="2.5" fill="#E8A2C8"/>
  </g>

  <!-- Scattered petal shapes -->
  <!-- Left cluster -->
  <g opacity="0.22" filter="url(#softglow)">
    <ellipse cx="72"  cy="88"  rx="7"  ry="13" fill="#E8A2C8" transform="rotate(-20 72 88)"/>
    <ellipse cx="56"  cy="105" rx="5"  ry="10" fill="#E8A2C8" transform="rotate(15 56 105)"/>
    <ellipse cx="90"  cy="68"  rx="4"  ry="9"  fill="#F2C8DE" transform="rotate(-40 90 68)"/>
    <ellipse cx="48"  cy="70"  rx="3.5" ry="8" fill="#C9956A" transform="rotate(30 48 70)"/>
    <ellipse cx="100" cy="110" rx="4"  ry="8"  fill="#E8A2C8" transform="rotate(10 100 110)"/>
    <circle  cx="78"  cy="55"  r="2.5" fill="#F2C8DE"/>
    <circle  cx="42"  cy="128" r="2"   fill="#E8A2C8"/>
  </g>
  <!-- Right cluster -->
  <g opacity="0.18" filter="url(#softglow)">
    <ellipse cx="838" cy="96"  rx="7"  ry="13" fill="#E8A2C8" transform="rotate(25 838 96)"/>
    <ellipse cx="856" cy="78"  rx="5"  ry="10" fill="#F2C8DE" transform="rotate(-10 856 78)"/>
    <ellipse cx="820" cy="68"  rx="4"  ry="9"  fill="#C9956A" transform="rotate(40 820 68)"/>
    <ellipse cx="862" cy="115" rx="4"  ry="8"  fill="#E8A2C8" transform="rotate(-15 862 115)"/>
    <ellipse cx="804" cy="112" rx="3.5" ry="7" fill="#F2C8DE" transform="rotate(20 804 112)"/>
    <circle  cx="848" cy="140" r="2"   fill="#E8A2C8"/>
    <circle  cx="876" cy="88"  r="2.5" fill="#F2C8DE"/>
  </g>
  <!-- Scattered small dots / petals -->
  <g opacity="0.13">
    <ellipse cx="200" cy="40"  rx="3" ry="6" fill="#E8A2C8" transform="rotate(30 200 40)"/>
    <ellipse cx="680" cy="34"  rx="3" ry="6" fill="#F2C8DE" transform="rotate(-20 680 34)"/>
    <ellipse cx="340" cy="248" rx="3" ry="6" fill="#E8A2C8" transform="rotate(15 340 248)"/>
    <ellipse cx="570" cy="252" rx="3" ry="6" fill="#C9956A" transform="rotate(-30 570 252)"/>
    <circle  cx="160" cy="240" r="2" fill="#E8A2C8"/>
    <circle  cx="750" cy="244" r="2" fill="#F2C8DE"/>
    <circle  cx="420" cy="36"  r="1.5" fill="#E8A2C8"/>
    <circle  cx="490" cy="248" r="1.5" fill="#E8A2C8"/>
  </g>

  <!-- Eyebrow text -->
  <text x="450" y="74" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="11" letter-spacing="6"
    fill="#E8A2C8" fill-opacity="0.55">✦  INFORMATICS STUDENT  ✦</text>

  <!-- Main name -->
  <text x="450" y="152" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="62" font-weight="300" letter-spacing="-1"
    fill="url(#nameGrad)" filter="url(#softglow)">Kenya Syalwa Arifia</text>

  <!-- Decorative line under name -->
  <rect x="120" y="164" width="660" height="0.8" fill="url(#lineGrad)" rx="1"/>

  <!-- Small diamond ornaments on line -->
  <g fill="#E8A2C8" fill-opacity="0.6">
    <polygon points="450,160 454,164 450,168 446,164"/>
    <polygon points="200,164 203,167.5 200,171 197,167.5" transform="scale(0.7) translate(137,70)"/>
    <polygon points="700,164 703,167.5 700,171 697,167.5" transform="scale(0.7) translate(-197,70)"/>
  </g>

  <!-- Tagline -->
  <text x="450" y="200" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="15" font-style="italic" letter-spacing="0.5"
    fill="#FDF6F0" fill-opacity="0.5">learning · building · improving</text>

  <!-- Tech tags -->
  <g font-family="'Courier New', monospace" font-size="11" letter-spacing="2">
    <!-- PHP -->
    <rect x="238" y="218" width="58" height="22" rx="11" fill="#E8A2C8" fill-opacity="0.08" stroke="#E8A2C8" stroke-opacity="0.25" stroke-width="0.7"/>
    <text x="267" y="233" text-anchor="middle" fill="#E8A2C8" fill-opacity="0.7">PHP</text>
    <!-- MySQL -->
    <rect x="308" y="218" width="68" height="22" rx="11" fill="#E8A2C8" fill-opacity="0.08" stroke="#E8A2C8" stroke-opacity="0.25" stroke-width="0.7"/>
    <text x="342" y="233" text-anchor="middle" fill="#E8A2C8" fill-opacity="0.7">MySQL</text>
    <!-- Python -->
    <rect x="388" y="218" width="74" height="22" rx="11" fill="#C9956A" fill-opacity="0.08" stroke="#C9956A" stroke-opacity="0.25" stroke-width="0.7"/>
    <text x="425" y="233" text-anchor="middle" fill="#C9956A" fill-opacity="0.7">Python</text>
    <!-- Figma -->
    <rect x="474" y="218" width="64" height="22" rx="11" fill="#E8A2C8" fill-opacity="0.08" stroke="#E8A2C8" stroke-opacity="0.25" stroke-width="0.7"/>
    <text x="506" y="233" text-anchor="middle" fill="#E8A2C8" fill-opacity="0.7">Figma</text>
    <!-- Git -->
    <rect x="550" y="218" width="52" height="22" rx="11" fill="#C9956A" fill-opacity="0.08" stroke="#C9956A" stroke-opacity="0.25" stroke-width="0.7"/>
    <text x="576" y="233" text-anchor="middle" fill="#C9956A" fill-opacity="0.7">Git</text>
  </g>

  <!-- GitHub link hint -->
  <text x="450" y="262" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="10" letter-spacing="3"
    fill="#9a7089" fill-opacity="0.7">github.com/KenyaLim</text>
</svg>
